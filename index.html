<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrocchia Madonna del Rosario - Gricignano d'Aversa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            padding-bottom: 60px;
        }

        header {
            background-color: #1e1e1e;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.2rem;
            color: #e0e0e0;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .card h3 {
            margin-bottom: 8px;
            color: #fff;
            font-size: 1.1rem;
        }

        .card p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .card .date {
            font-size: 0.8rem;
            color: #666;
            margin-top: 8px;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1e1e1e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            width: 20%;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        .hero-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #fff;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }

        textarea.form-control {
            height: 100px;
            resize: none;
        }

        .btn {
            background-color: #007aff;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:disabled {
            background-color: #333;
            color: #666;
        }

        .btn-logout {
            background-color: #ff3b30;
            margin-top: 15px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .gallery-item {
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .gallery-item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .gallery-title {
            padding: 8px;
            font-size: 0.85rem;
            color: #fff;
            text-align: center;
        }

        .badge {
            background-color: #ff9500;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }

        .badge-omelia {
            background-color: #34c759;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Madonna del Rosario</h1>
    </header>

    <!-- HOME PAGE -->
    <div id="page-home" class="page active">
        <div class="container">
            <img src="https://images.unsplash.com/photo-1548625361-155deee2591a?ixlib=rb-4.0.3" alt="Chiesa" class="hero-img">
            
            <div class="card">
                <h3>Sante Messe Feriali</h3>
                <div class="info-row"><span class="info-label">Lunedì - Sabato</span><span class="info-value">18:30</span></div>
            </div>

            <div class="card">
                <h3>Sante Messe Festive</h3>
                <div class="info-row"><span class="info-label">Domenica Mattina</span><span class="info-value">08:30</span></div>
                <div class="info-row"><span class="info-label">Domenica Mattina</span><span class="info-value">11:00</span></div>
                <div class="info-row"><span class="info-label">Domenica Sera</span><span class="info-value">18:30</span></div>
            </div>

            <div class="card">
                <h3>Contatti</h3>
                <div class="info-row"><span class="info-label">Parroco</span><span class="info-value">Don Francesco</span></div>
                <div class="info-row"><span class="info-label">Email</span><span class="info-value">info@parrocchia.it</span></div>
            </div>
        </div>
    </div>

    <!-- AVVISI PAGE -->
    <div id="page-avvisi" class="page">
        <div class="container" id="container-avvisi">
            <!-- Dinamico -->
        </div>
    </div>

    <!-- OMELIE PAGE -->
    <div id="page-omelie" class="page">
        <div class="container" id="container-omelie">
            <!-- Dinamico -->
        </div>
    </div>

    <!-- GALLERIA PAGE -->
    <div id="page-galleria" class="page">
        <div class="container">
            <div class="gallery-grid" id="container-galleria">
                <!-- Dinamico -->
            </div>
        </div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="page-admin" class="page">
        <div class="container">
            <!-- Login Form -->
            <div id="login-form">
                <div class="card">
                    <h3 style="margin-bottom: 15px; text-align: center;">Area Riservata</h3>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control">
                    </div>
                    <button class="btn" id="btn-login" onclick="login()">Accedi</button>
                </div>
            </div>

            <!-- Admin Panel (Hidden by default) -->
            <div id="admin-panel" style="display: none;">
                <div class="card">
                    <h3>Nuovo Contenuto</h3>
                    <div class="form-group">
                        <label>Tipo di Post</label>
                        <select id="post-type" class="form-control" onchange="toggleFormFields()">
                            <option value="avvisi">Avviso Parrocchiale</option>
                            <option value="omelie">Omelia</option>
                            <option value="galleria">Foto Galleria</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Titolo</label>
                        <input type="text" id="post-title" class="form-control">
                    </div>
                    <div class="form-group" id="field-content">
                        <label>Testo del Contenuto</label>
                        <textarea id="post-content" class="form-control"></textarea>
                    </div>
                    <div class="form-group" id="field-url" style="display: none;">
                        <label>URL Immagine</label>
                        <input type="text" id="post-url" class="form-control" placeholder="https://example.com/image.jpg">
                    </div>
                    <button class="btn" id="btn-save" onclick="savePost()">Pubblica</button>
                    <button class="btn btn-logout" onclick="logout()">Esci</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="nav-bar">
        <button class="nav-item active" id="nav-home" onclick="navigateTo('home')">
            <span class="nav-icon">⛪</span>
            <span>Home</span>
        </button>
        <button class="nav-item" id="nav-avvisi" onclick="navigateTo('avvisi')">
            <span class="nav-icon">📢</span>
            <span>Avvisi</span>
        </button>
        <button class="nav-item" id="nav-omelie" onclick="navigateTo('omelie')">
            <span class="nav-icon">📖</span>
            <span>Omelie</span>
        </button>
        <button class="nav-item" id="nav-galleria" onclick="navigateTo('galleria')">
            <span class="nav-icon">🖼️</span>
            <span>Galleria</span>
        </button>
        <button class="nav-item" id="nav-admin" onclick="navigateTo('admin')">
            <span class="nav-icon">🔒</span>
            <span>Gestisci</span>
        </button>
    </nav>

    <script>
        // CONFIGURAZIONE CORRETTA SUPABASE ORIGINALE
        const SUPABASE_URL = "https://qjguywunscgqasgsqtns.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZ3l3dW5zY2dxYXNnc3F0bnMiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczNjE5OTkxNywiZXhwIjoyMDUxNzc1OTE3fQ.bXbA-z80z-Ebe9t-oGbyxX3bC8hO6e66e-u0M8v7L2s";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // FUNZIONE DI NAVIGAZIONE ORIGINALE INTEGRATA CON GESTIONE HASH
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

            const targetPage = document.getElementById('page-' + pageId);
            const targetNav = document.getElementById('nav-' + pageId);

            if (targetPage) targetPage.classList.add('active');
            if (targetNav) targetNav.classList.add('active');

            // Imposta l'intestazione corretta
            const titles = { home: "Madonna del Rosario", avvisi: "Avvisi Parrocchiali", omelie: "Le Omelie", galleria: "Galleria", admin: "Area Riservata" };
            document.getElementById('header-title').innerText = titles[pageId] || "Madonna del Rosario";

            // Sincronizza l'hash dell'URL in modo pulito
            if (window.location.hash !== '#' + pageId) {
                history.pushState(null, null, '#' + pageId);
            }

            // Avvia i caricamenti asincroni nativi
            if (pageId === 'avvisi') loadAvvisi();
            if (pageId === 'omelie') loadOmelie();
            if (pageId === 'galleria') loadGalleria();
            if (pageId === 'admin') checkSession();

            window.scrollTo(0, 0);
        }

        // --- INTERCETTAZIONE DEI COLLEGAMENTI ESTERNI O DIRETTI (#) ---
        function handleHashRouting() {
            const hash = window.location.hash.replace('#', '');
            const pagineAmmesse = ['home', 'avvisi', 'omelie', 'galleria', 'admin'];
            if (hash && pagineAmmesse.includes(hash)) {
                navigateTo(hash);
            } else if (!hash) {
                navigateTo('home');
            }
        }
        window.addEventListener('hashchange', handleHashRouting);
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(handleHashRouting, 100);
        });

        // VISUALIZZAZIONE CAMPI ADMIN
        function toggleFormFields() {
            const type = document.getElementById('post-type').value;
            if (type === 'galleria') {
                document.getElementById('field-content').style.display = 'none';
                document.getElementById('field-url').style.display = 'block';
            } else {
                document.getElementById('field-content').style.display = 'block';
                document.getElementById('field-url').style.display = 'none';
            }
        }

        // SUPABASE: CARICAMENTO AVVISI
        async function loadAvvisi() {
            const container = document.getElementById('container-avvisi');
            container.innerHTML = '<p style="text-align:center;color:#666;">Caricamento...</p>';
            
            const { data, error } = await _supabase.from('avvisi').select('*').order('created_at', { ascending: false });
            if (error) return container.innerHTML = '<p style="color:red;">Errore di caricamento</p>';
            
            container.innerHTML = data.length === 0 ? '<p style="text-align:center;color:#666;">Nessun avviso presente</p>' : '';
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                container.innerHTML += `
                    <div class="card">
                        <span class="badge">IMPORTANTE</span>
                        <h3>${item.title}</h3>
                        <p>${item.content}</p>
                        <div class="date">${date}</div>
                    </div>`;
            });
        }

        // SUPABASE: CARICAMENTO OMELIE
        async function loadOmelie() {
            const container = document.getElementById('container-omelie');
            container.innerHTML = '<p style="text-align:center;color:#666;">Caricamento...</p>';
            
            const { data, error } = await _supabase.from('omelie').select('*').order('created_at', { ascending: false });
            if (error) return container.innerHTML = '<p style="color:red;">Errore di caricamento</p>';
            
            container.innerHTML = data.length === 0 ? '<p style="text-align:center;color:#666;">Nessuna omelia presente</p>' : '';
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                container.innerHTML += `
                    <div class="card">
                        <span class="badge badge-omelia">OMELIA</span>
                        <h3>${item.title}</h3>
                        <p>${item.content}</p>
                        <div class="date">${date}</div>
                    </div>`;
            });
        }

        // SUPABASE: CARICAMENTO GALLERIA
        async function loadGalleria() {
            const container = document.getElementById('container-galleria');
            container.innerHTML = '<p style="text-align:center;color:#666;grid-column:span 2;">Caricamento...</p>';
            
            const { data, error } = await _supabase.from('galleria').select('*').order('created_at', { ascending: false });
            if (error) return container.innerHTML = '<p style="color:red;grid-column:span 2;">Errore di caricamento</p>';
            
            container.innerHTML = data.length === 0 ? '<p style="text-align:center;color:#666;grid-column:span 2;">Nessuna foto presente</p>' : '';
            data.forEach(item => {
                container.innerHTML += `
                    <div class="gallery-item">
                        <img src="${item.image_url}" alt="Foto">
                        <div class="gallery-title">${item.title}</div>
                    </div>`;
            });
        }

        // SUPABASE: ACCESSO GESTORE
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');

            if (!email || !password) return alert('Inserisci tutti i campi');
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            btn.disabled = false;

            if (error) {
                alert('Accesso fallito: ' + error.message);
            } else {
                currentUser = data.user;
                showAdminPanel();
            }
        }

        async function logout() {
            await _supabase.auth.signOut();
            currentUser = null;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        async function checkSession() {
            const { data } = await _supabase.auth.getSession();
            if (data.session) {
                currentUser = data.session.user;
                showAdminPanel();
            } else {
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('login-form').style.display = 'block';
            }
        }

        function showAdminPanel() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        }

        // SUPABASE: SALVATAGGIO DEI NUOVI DATI
        async function savePost() {
            const type = document.getElementById('post-type').value;
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const imageUrl = document.getElementById('post-url').value;
            const btn = document.getElementById('btn-save');

            if (!title) return alert('Il titolo è obbligatorio');
            btn.disabled = true;

            let resultError = null;

            if (type === 'avvisi') {
                const { error } = await _supabase.from('avvisi').insert([{ title, content }]);
                resultError = error;
            } else if (type === 'omelie') {
                const { error } = await _supabase.from('omelie').insert([{ title, content }]);
                resultError = error;
            } else if (type === 'galleria') {
                if (!imageUrl) { btn.disabled = false; return alert('L\'URL immagine è obbligatorio'); }
                const { error } = await _supabase.from('galleria').insert([{ title, image_url: imageUrl }]);
                resultError = error;
            }

            btn.disabled = false;

            if (resultError) {
                alert('Errore di pubblicazione: ' + resultError.message);
            } else {
                alert('Contenuto pubblicato con successo!');
                document.getElementById('post-title').value = '';
                document.getElementById('post-content').value = '';
                document.getElementById('post-url').value = '';
                navigateTo(type);
            }
        }

        // Inizializzazione della sessione in background al boot del sito
        checkSession();
    </script>
</body>
</html>
